# LOCAL DEVELOPMENT - PostgreSQL on your machine
spring.datasource.url=jdbc:postgresql://localhost:5432/restaurant_db
spring.datasource.username=postgres
spring.datasource.password=Navyasri@10
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=mySecretKeyForJWTTokenGenerationRestaurantApp2024
jwt.expiration=86400000

# Cloudinary (dummy for local dev)
cloudinary.cloud-name=dummy
cloudinary.api-key=dummy
cloudinary.api-secret=dummy

# CORS
cors.allowed-origins=http://localhost:9650

# Server
server.port=7650

# Logging
logging.level.com.restaurant.service.ReservationService=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
