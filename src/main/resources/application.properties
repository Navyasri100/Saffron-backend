# PostgreSQL — uses env vars in production, falls back to local for dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.qzgnwcogqetgxhcltgce.supabase.co:5432/postgres?sslmode=require}
spring.datasource.hikari.connection-init-sql=SET SESSION CHARACTERISTICS AS TRANSACTION ISOLATION LEVEL READ COMMITTED
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:Navyasri@10}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Mailgun SMTP (reliable, 5000 emails/month free, no recipient restrictions)
spring.mail.host=smtp.mailgun.org
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy}

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationRestaurantApp2024}
jwt.expiration=86400000

# CORS — allow all origins in prod (locked down per env var)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:9650}

# Server
server.port=${PORT:7650}

# Logging
logging.level.com.restaurant.service.EmailService=INFO
logging.level.com.restaurant.service.ReservationService=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
